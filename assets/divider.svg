  </defs>
  <line x1="0" y1="4" x2="850" y2="4" stroke="url(#div-grad)" stroke-width="2" />
  <circle cx="425" cy="4" r="3" fill="#00f0ff">
    <animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite" />
