      <stop offset="15%" stop-color="#00f0ff" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#0072ff" stop-opacity="0.8" />
      <stop offset="85%" stop-color="#00f0ff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
